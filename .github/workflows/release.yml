name: Build and Release Escrow Contract

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: write
  attestations: write

jobs:
  release-contract:
    uses: stellar-expert/soroban-build-workflow/.github/workflows/release.yml@main
    with:
      release_name: ${{ github.ref_name }}
      package: "escrow"
      relative_path: "contracts/escrow"
      make_target: ""
    secrets:
      release_token: ${{ secrets.GITHUB_TOKEN }}
